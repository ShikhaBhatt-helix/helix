.mobile-menu-btn{display:none;background:none;border:none;font-size:22px;cursor:pointer;padding:4px}

label{display:block;font-size:13px;font-weight:600;color:var(--g700);margin-bottom:8px}

.fc{padding:10px 14px;background:#fff;border-radius:8px;border:1px solid var(--g200);margin-bottom:8px}

.trb.t1{background:var(--r50);color:var(--r700)}.trb.t2{background:var(--a50);color:var(--a700)}
.trb.t3{background:#d4edda;color:var(--gn700)}.trb.t4{background:var(--g200);color:var(--g500)}.trb.t5{background:var(--g50);color:var(--g500)}

  .sidebar{transform:translateX(-100%)}

.settings-box{background:#fff;border-radius:16px;padding:24px;border:1px solid var(--g200);margin-bottom:16px}

.settings-overlay{position:fixed;top:0;right:0;width:380px;max-width:90vw;height:100vh;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.1);z-index:50;padding:24px;overflow-y:auto;animation:slideIn .3s ease}

.radio-group{display:flex;gap:12px;margin:8px 0}
.radio-opt{display:flex;align-items:center;gap:6px;padding:10px 20px;border-radius:24px;border:1.5px solid var(--g200);cursor:pointer;transition:all .25s;font-size:13px;font-weight:500}
.radio-opt:hover{border-color:var(--pp-blue)}
.radio-opt.selected{background:var(--accent-light);border-color:var(--accent);color:var(--accent);font-weight:600}

let FOUNDATION_DATA = {outcomes: {}, evidence: {}};

async function loadFoundationData() {
  try {
    // Load foundation.drafts.json
    const draftsRes = await fetch('foundation.drafts.json');
    const drafts = await draftsRes.json();

    // Load new.evidence.json
    const evidRes = await fetch('new.evidence.json');
    const evidence = await evidRes.json();

    // Index outcomes by ID for quick lookup
    if (drafts.outcomes && Array.isArray(drafts.outcomes)) {
      for (const outcome of drafts.outcomes) {
        FOUNDATION_DATA.outcomes[outcome.out_id] = {
          importance: outcome.importance,
          satisfaction: outcome.satisfaction,
          confidence: outcome.confidence,
          evidence_ids: outcome.evidence_ids || []
        };
      }
    }

    // Index evidence by ID for quick lookup
    if (evidence.evidence_units && Array.isArray(evidence.evidence_units)) {
      for (const ev of evidence.evidence_units) {
        FOUNDATION_DATA.evidence[ev.evidence_id] = {
          title: ev.title,
          grade: ev.grade,
          source_type: ev.source_type,
          description: ev.description,
          verbatim_quotes: ev.verbatim_quotes || []
        };
      }
    }

    console.log('✓ Foundation data loaded', FOUNDATION_DATA);
  } catch (e) {
    console.warn('⚠ Could not load foundation data:', e.message);
    // Gracefully degrade — use embedded data instead
  }
}

// Load foundation data on page initialization
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', loadFoundationData);
} else {
  loadFoundationData();
}

function getOutcomeScoresFromEvidence(outcomeId) {
  const outcomeData = FOUNDATION_DATA.outcomes[outcomeId];
  if (outcomeData) {
    return {
      importance: outcomeData.importance,
      satisfaction: outcomeData.satisfaction,
      confidence: outcomeData.confidence,
      evidence_ids: outcomeData.evidence_ids
    };
  }
  return null;
}

function findBestStep(problem) {
  const p = problem.toLowerCase();
  const stepKws = [
    {id:"STEP-PURCH-001",kws:["browse","navigate","find product","search","site","website","app","open","landing","homepage","store","shop front","marketplace","discover"]},
    {id:"STEP-PURCH-002",kws:["compare","price","pricing","trust","seller","review","rating","product detail","specification","quality","legitimate","fake","scam","evaluate product","choose product","product info"]},
    {id:"STEP-PURCH-003",kws:["checkout","begin checkout","start checkout","initiate","cart","proceed","sign in","log in","login","account create","register","onboard","guest checkout"]},
    {id:"STEP-PURCH-004",kws:["address","shipping","delivery option","fulfillment","phone number","email","contact info","billing address","zip","postal","form fill","personal info","delivery details"]},
    {id:"STEP-PURCH-005",kws:["payment method","pay with","card","wallet","select payment","credit card","debit","bank account","paypal button","venmo","instrument","stored card","payment option","password","recover","forgot","authentication","biometric","passkey","locked out","reset password","credential","otp","2fa","mfa","sca","verify identity","login failure","access recovery"]},
    {id:"STEP-PURCH-006",kws:["coupon","discount","promo","offer","reward","cashback","points","savings","deal","voucher","code","loyalty","installment","pay later","bnpl","credit offer","split pay","pay in 4"]},
    {id:"STEP-PURCH-007",kws:["authorize","submit payment","confirm payment","approve","complete transaction","processing","decline","payment fail","error","timeout","3ds","otp confirm","review order","final confirm","place order","transaction fail"]},
    {id:"STEP-PURCH-008",kws:["confirmation","receipt","order confirm","verify order","email confirm","order summary","order number","tracking number","expected delivery","what happens next","order status"]},
    {id:"STEP-PURCH-009",kws:["return","refund","dispute","track package","shipping status","delivery status","post-purchase","cancel order","exchange","complaint","support","help","customer service","chargeback","damaged","wrong item","missing","late delivery"]},
    {id:"STEP-SALE-001",kws:["seller","merchant","accept payment","requirements","onboarding","eligibility","business type","tax status","understand requirements"]},
    {id:"STEP-SALE-002",kws:["prepare","validate","business registration","document","tax id","address proof","data before submission"]},
    {id:"STEP-SALE-003",kws:["submit","submit business","transmit information","verification","business registration verification"]},
    {id:"STEP-SALE-004",kws:["verification result","feedback","acceptance","hold","account hold","unexpected hold","clear feedback","rejected","accepted"]},
    {id:"STEP-SALE-005",kws:["correct","rejected data","fix","remediation","resubmit","error correction"]},
    {id:"STEP-SALE-006",kws:["authorize","activate account","agreement","terms","begin accepting"]}
  ];
  let best=null,bestScore=0;
  for(const s of stepKws){let score=0;for(const k of s.kws){if(p.includes(k))score+=k.split(" ").length}if(score>bestScore){bestScore=score;best=s.id}}
  if(bestScore<2){
    // SALE job fallbacks
    if(/account hold|payment hold|21.?day|unexpected hold/.test(p))best="STEP-SALE-004";
    else if(/business registration|business data|cip|verification/.test(p))best="STEP-SALE-002";
    else if(/seller|merchant|accept payment|payment processor/.test(p))best="STEP-SALE-004";
    // PURCH job fallbacks
    else if(/refund|return|cancel|disput|complain|chargeback|damaged|wrong item/.test(p))best="STEP-PURCH-009";
    else if(/ship|deliver|address|postal/.test(p))best="STEP-PURCH-004";
    else if(/coupon|discount|offer|reward|bnpl|pay later|installment/.test(p))best="STEP-PURCH-006";
    else if(/confirm|receipt|order status|tracking/.test(p))best="STEP-PURCH-008";
    else if(/checkout|cart|sign in|log in|guest/.test(p))best="STEP-PURCH-003";
    else if(/browse|search|find|discover|shop/.test(p))best="STEP-PURCH-001";
    else if(/compare|price|trust|review|quality/.test(p))best="STEP-PURCH-002";
    else if(/decline|fail|submit|authorize|place order/.test(p))best="STEP-PURCH-007";
    else if(/pay|payment|card|wallet/.test(p))best="STEP-PURCH-005";
    else best="STEP-PURCH-005";
  }
  return best;
}

function isPasswordRecovery(problem) {
  const p = problem.toLowerCase();
  return ["password","forgot password","recover access","locked out","reset password","credential","authentication fail","login fail","can't log in","unable to log","unable to access","access recovery","account locked","session expired","biometric fail","passkey"].some(k => p.includes(k));
}

function generateEvaluations(stepId, problem, market, matched) {
  const outcomes = OUTCOMES[stepId] || OUTCOMES["STEP-PURCH-005"];
  const isPwdRecovery = isPasswordRecovery(problem);
  const step = STEPS.find(s => s.step_id === stepId);

  // Filter outcomes - for password recovery, include access_interrupted outcomes
  let relevant = isPwdRecovery
    ? outcomes.filter(o => o.cond === "access_interrupted" || ["OUT-PURCH-034","OUT-PURCH-036","OUT-PURCH-045","OUT-PURCH-042"].includes(o.id))
    : outcomes.filter(o => !o.cond).slice(0, 6);

  if (relevant.length === 0) relevant = outcomes.slice(0, 5);

  const evals = relevant.map((o, i) => {
    // Smart scoring based on outcome characteristics
    // First check if outcome has scores from loaded foundation data
    let imp, sat, tier, kano, signal, impConf, satConf;
    let evidenceScores = getOutcomeScoresFromEvidence(o.id);

    if (evidenceScores) {
      // Use scores loaded from foundation.drafts.json
      imp = evidenceScores.importance;
      sat = evidenceScores.satisfaction;
      impConf = evidenceScores.confidence;
      satConf = Math.max(1, evidenceScores.confidence - 1);

      // Derive tier from importance + satisfaction
      if (imp === "high" && sat === "low") tier = "tier_1";
      else if (imp === "high" && sat === "medium") tier = "tier_2";
      else if (imp === "high" && sat === "high") tier = "tier_3";
      else if (imp === "medium" && sat === "low") tier = "tier_2";
      else if (imp === "medium" && sat === "medium") tier = "tier_3";
      else if (imp === "low") tier = "tier_4";
      else tier = "tier_5";

      // Kano classification based on tier
      if (tier === "tier_1") kano = "performance";
      else if (tier === "tier_2") kano = "performance";
      else kano = "must_be";

      signal = matched ? "invest" : "research_first";
    } else if (o.importance && o.satisfaction && o.confidence) {
      // Fall back to explicit importance/satisfaction from embedded foundation data
      imp = o.importance;
      sat = o.satisfaction;
      impConf = o.confidence;
      satConf = Math.max(1, o.confidence - 1);

      // Derive tier from importance + satisfaction
      if (imp === "high" && sat === "low") tier = "tier_1";
      else if (imp === "high" && sat === "medium") tier = "tier_2";
      else if (imp === "high" && sat === "high") tier = "tier_3";
      else if (imp === "medium" && sat === "low") tier = "tier_2";
      else if (imp === "medium" && sat === "medium") tier = "tier_3";
      else if (imp === "low") tier = "tier_4";
      else tier = "tier_5";

      // Kano classification based on tier
      if (tier === "tier_1") kano = "performance";
      else if (tier === "tier_2") kano = "performance";
      else kano = "must_be";

      signal = matched ? "invest" : "research_first";
    } else if (o.cond === "access_interrupted") {
      // Password recovery outcomes — high importance, low satisfaction (the POC result)
      imp = "high"; sat = "low"; tier = "tier_1"; kano = i===0?"performance":"must_be"; signal = matched?"invest":"research_first";
      impConf = matched ? 4 : 2; satConf = matched ? 3 : 1;
    } else if (o.type === "emotional") {
      imp = "high"; sat = "medium"; tier = "tier_2"; kano = "must_be"; signal = "research_first";
      impConf = matched ? 3 : 2; satConf = matched ? 3 : 1;
    } else if (o.name.includes("Minimize time") || o.name.includes("Minimize likelihood")) {
      imp = "high"; sat = i < 2 ? "low" : "medium"; tier = i < 2 ? "tier_1" : "tier_2"; kano = "performance"; signal = matched && i < 2 ? "invest" : "research_first";
      impConf = matched ? 4 : 2; satConf = matched ? 3 : 1;
    } else {
      imp = "medium"; sat = "medium"; tier = "tier_4"; kano = "performance"; signal = "monitor";
      impConf = matched ? 3 : 2; satConf = matched ? 2 : 1;
    }

    const tierLabels = {tier_1:"Underserved — highest opportunity",tier_2:"Competitive — room to differentiate",tier_3:"Table stakes — must maintain",tier_4:"Monitor — revisit if context changes",tier_5:"Deprioritise — not relevant now"};

    // Evidence-based rationales for SALE job outcomes
    const saleImpRationales = {
      "OUT-SALE-001": `Grade A research (UX Research, June 2019): "There is no way to proactively update...they call here asking questions" — high frequency, unmet need for clarity on requirements.`,
      "OUT-SALE-002": `Grade A evidence (UX Research): unclear requirements lead to sellers submitting invalid business registration data, causing downstream friction.`,
      "OUT-SALE-003": `Grade A evidence (UX Research): account created with bad data → later 8-21 day holds. This is the core problem blocking sellers from immediate payment acceptance.`,
      "OUT-SALE-004": `Grade A evidence (UX Research): "I can't get paid for 21 days...this isn't business, this is insane." Documented seller abandonment to Square. Blocking outcome.`,
      "OUT-SALE-005": `Grade A/B evidence (UX Research): problem statement indicates lack of clear guidance on remediation path for rejected business registration data.`
    };

    const saleSatRationales = {
      "OUT-SALE-001": `Current state: No clear requirements listed upfront. Sellers lack understanding → high support call volume.`,
      "OUT-SALE-002": `Current state: Unclear specification for required documents and data format. Sellers submit invalid data without validation feedback.`,
      "OUT-SALE-003": `Current state: System allows account creation with bad business data. Verification happens post-account-creation, causing 8-21 day holds.`,
      "OUT-SALE-004": `Current state: Account holds are systemic. Sellers experience unexpected holds after account creation, leading to abandonment.`,
      "OUT-SALE-005": `Current state: When rejected, sellers receive no clear guidance on what was wrong or how to fix it. No self-service remediation path.`
    };

    const impRationales = {
      high: [`Frequently mentioned unprompted in ${market} customer research; strong frustration when unmet.`,`Blocking outcome — job cannot complete without this. High consequence of failure in ${market} market.`,`Consistently reported as top friction point across ${market} checkout research.`,`Emotional impact consistently reported in checkout abandonment studies for ${market}.`],
      medium: [`Mentioned when prompted; moderate frustration reported in ${market} studies.`,`Non-blocking but affects conversion quality in ${market} market.`],
      low: [`Rarely mentioned in ${market} research; low frustration when unmet.`]
    };
    const satRationales = {
      low: [`Current PayPal flow averages 45s under SCA in ${market}. Competitors offer sub-5s biometric paths.`,`No progress indicators or time estimates during recovery flow in ${market}.`,`Significant unmet need; consistent friction and workarounds reported.`],
      medium: [`Current flow provides basic functionality but lacks progressive disclosure in ${market}.`,`Partial achievement; manageable friction but workarounds exist.`],
      high: [`Current solution fully meets outcome; no friction reported in ${market}.`]
    };

    // Use evidence-based rationales if available
    let impRationale, satRationale;

    // Prefer hardcoded SALE rationales which are evidence-backed
    if (saleImpRationales[o.id]) {
      impRationale = saleImpRationales[o.id];
      satRationale = saleSatRationales[o.id];
    } else if (evidenceScores && evidenceScores.evidence_ids.length > 0) {
      // Build rationale from loaded evidence for non-SALE outcomes
      const evidQuotes = evidenceScores.evidence_ids
        .map(eid => FOUNDATION_DATA.evidence[eid])
        .filter(e => e)
        .map(e => e.verbatim_quotes?.[0] || e.description)
        .filter(q => q);

      impRationale = evidQuotes.length > 0
        ? `Grade A evidence: "${evidQuotes[0]}"`
        : `Evidence supports high importance for ${o.name}.`;
      satRationale = `Current state shows low satisfaction. Sellers report friction on this outcome.`;
    } else {
      // Fall back to generic rationales
      impRationale = impRationales[imp][i % impRationales[imp].length];
      satRationale = satRationales[sat][i % satRationales[sat].length];
    }

    return {
      eval_id: `EVAL-${String(i+1).padStart(3,"0")}`,
      out_id: o.id,
      outcome_name: o.name,
      outcome_type: o.type,
      step_name: step?.name || "",
      importance: { value: imp, rationale: impRationale, confidence: impConf },
      satisfaction: { value: sat, rationale: satRationale, confidence: satConf },
      opportunity_score: tier,
      opportunity_derivation: `${imp} importance + ${sat} satisfaction = ${tierLabels[tier]}`,
      opportunity_confidence: Math.min(impConf, satConf),
      kano_classification: kano,
      kano_rationale: kano === "performance" ? "More is linearly better; customers know variations exist across competitors." : kano === "must_be" ? "Customers know this could be better AND expect it should be." : "Customers do NOT know or expect improvement is possible.",
      barriers: i < 2 && !saleImpRationales[o.id] ? [
        {id:`BAR-${String(i+1).padStart(3,"0")}`, description: i===0 ? `SCA regulation mandates additional authentication steps that add friction in ${market}.` : `Legacy infrastructure prevents seamless fallback mechanisms in ${market} checkout flows.`}
      ] : o.id.startsWith("OUT-SALE") ? [{id:`BAR-${String(i+1).padStart(3,"0")}`, description: `System allows payment account creation before business registration validation completes.`}] : [],
      gaps: i < 3 && !saleImpRationales[o.id] ? [
        {id:`GAP-${String(i+1).padStart(3,"0")}`, description: i===0 ? `Passkeys adoption rate unknown in ${market} mobile — blocks final investment sizing.` : i===1 ? `No A-grade evidence on competitor biometric recovery completion rates in ${market}.` : `Customer expectation data insufficient to confirm Kano classification.`}
      ] : o.id.startsWith("OUT-SALE") ? [{id:`GAP-${String(i+1).padStart(3,"0")}`, description: `Cohort analysis needed: % of new SMB sellers experiencing holds within 30 days of account creation.`}] : [],
      invest_signal: signal,
      invest_rationale: signal === "invest" ? `Tier 1 underserved outcome with confidence ≥3 in ${market} scope.` : signal === "research_first" ? `Evidence gaps on ${matched?"satisfaction dimension":"both dimensions"} — research required before investment.` : `Medium priority — monitor for context changes in ${market}.`
    };
  });

  const tier1 = evals.filter(e => e.opportunity_score === "tier_1").length;
  const tier2 = evals.filter(e => e.opportunity_score === "tier_2").length;
  const overallConf = matched ? 3 : 1;

  return {
    evaluations: evals,
    summary: {
      decision_context: `Assessment of "${problem.substring(0,80)}${problem.length>80?"...":""}" for the ${market} market. ${matched ? "Foundations matched from approved Helix library. Evaluation scope: "+step?.name+" step within Complete a Purchase job." : "Discovery Mode — proposed foundations require governance approval before canonical use."}`,
      recommendation: tier1 > 0 && matched
        ? `Invest — ${tier1} underserved outcome(s) identified with directional evidence in ${market}. ${tier2} competitive gap(s) also present. Research gaps exist on competitive metric evidence but directional signal is strong enough for investment at confidence ${overallConf}.`
        : `Research first — ${matched ? "evidence gaps exist on key dimensions" : "proposed foundations require governance approval and evidence structuring"} before investment decisions can be made for ${market}. Commission research on ${evals.flatMap(e=>e.gaps).length} identified knowledge gaps.`,
      overall_confidence: overallConf,
      key_findings: [
        `${evals.length} outcomes evaluated across the ${step?.name || "selected"} step in ${market} scope.`,
        tier1 > 0 ? `${tier1} outcome(s) scored as Tier 1 (underserved — highest opportunity). These represent the strongest investment targets.` : "No Tier 1 outcomes — all outcomes are adequately served or require more research.",
        matched ? "Foundations are approved and governed — scores are directional with traceable evidence basis." : "All foundations are proposed (not approved). Governance review required before canonical use.",
        evals.flatMap(e=>e.gaps).length > 0 ? `${evals.flatMap(e=>e.gaps).filter((g,i,a)=>a.findIndex(x=>x.id===g.id)===i).length} knowledge gap(s) identified — these constrain invest signals and should be prioritized for research.` : "No critical knowledge gaps identified.",
        evals.flatMap(e=>e.barriers).length > 0 ? `${evals.flatMap(e=>e.barriers).filter((b,i,a)=>a.findIndex(x=>x.id===b.id)===i).length} structural barrier(s) identified that may require platform-level solutions.` : "",
      ].filter(Boolean),
      total_outcomes: evals.length,
      tier_1_count: tier1,
      tier_2_count: tier2,
      overall_invest_signal: tier1 > 0 && matched ? "invest" : "research_first"
    },
    matched
  };
}

    rationale = `"Manage Subscription Payments" is not currently in the Helix Phase 1 scope. This is a newly discovered job. All proposed foundations require governance approval before canonical use.`;
  } else {
    jobIdOut = "JOB-NEW-001";
    jobName = isPlanned ? selectedJob.name : "Unclassified Job";
    jobDesc = `When I encounter this problem, I want to resolve it efficiently so that I can achieve my goal.`;
    steps = [{id:"STEP-NEW-001",name:"Identify Need",seq:1},{id:"STEP-NEW-002",name:"Execute Action",seq:2},{id:"STEP-NEW-003",name:"Confirm Resolution",seq:3}];
    outcomes = [
      {id:"OUT-NEW-001",step_id:"STEP-NEW-001",name:"Minimize time required to understand what action is needed",type:"functional"},
      {id:"OUT-NEW-002",step_id:"STEP-NEW-002",name:"Minimize effort required to complete the primary action",type:"functional"},
      {id:"OUT-NEW-003",step_id:"STEP-NEW-002",name:"Minimize likelihood of errors during the process",type:"functional"},
      {id:"OUT-NEW-004",step_id:"STEP-NEW-003",name:"Maximize confidence that the desired outcome was achieved",type:"emotional"},
      {id:"OUT-NEW-005",step_id:"STEP-NEW-003",name:"Minimize anxiety about unintended consequences",type:"emotional"},
    ];
    rationale = `The problem statement could not be matched to existing Helix foundations. The system has proposed generic foundations based on the problem description. These require governance review, refinement, and approval before canonical use.`;
  }

  return {
    matched: false,
    confidence: 0,
    is_planned_job: isPlanned,
    proposed_job: {job_id: jobIdOut, name: jobName, description: jobDesc},
    proposed_steps: steps.map(s => ({step_id:s.id, name:s.name, sequence_number:s.seq})),
    proposed_outcomes: outcomes,
    match_rationale: rationale
  };
}

async function sbSave(fd, mr, evals, summary) {
  const c = getSB(); if (!c) return null;
  try {
    const insertData = {
      persona:fd.persona, job_id:fd.jobId, job_name:fd.jobName,
      problem_statement:fd.problem, market:fd.market,
      is_matched:mr.matched, match_confidence:mr.confidence||0,

      match_rationale:mr.match_rationale||null,

      decision_context:summary.decision_context||null, recommendation:summary.recommendation||null,
      key_findings:summary.key_findings||[],
      tier_1_count:summary.tier_1_count||0, tier_2_count:summary.tier_2_count||0, total_outcomes:summary.total_outcomes||0,
      proposed_job:mr.proposed_job||null, proposed_steps:mr.proposed_steps||null,
      created_by_name:localStorage.getItem('helix_user_email')||'MOI User',
    };
    const { data: ar, error: e1 } = await c.from('assessment_requests').insert(insertData).select().single();
    if (e1) { console.error('Save err:', JSON.stringify(e1)); return null; }
    const aid = ar.id;
    const rows = evals.map(ev => ({
      assessment_id:aid, eval_id:ev.eval_id, out_id:ev.out_id, outcome_name:ev.outcome_name, outcome_type:ev.outcome_type,
      step_id:ev.step_id||null, step_name:ev.step_name||null,
      importance_value:ev.importance.value, importance_rationale:ev.importance.rationale, importance_confidence:ev.importance.confidence,
      satisfaction_value:ev.satisfaction.value, satisfaction_rationale:ev.satisfaction.rationale, satisfaction_confidence:ev.satisfaction.confidence,
      opportunity_score:ev.opportunity_score, opportunity_derivation:ev.opportunity_derivation, opportunity_confidence:ev.opportunity_confidence,
      kano_classification:ev.kano_classification, kano_rationale:ev.kano_rationale,
      invest_signal:ev.invest_signal||'research_first', invest_rationale:ev.invest_rationale||'',
    }));
    const {error:e2} = await c.from('outcome_evaluations').insert(rows);
    if(e2) console.error('Eval save err:', JSON.stringify(e2));
    const gaps = evals.flatMap(ev => (ev.gaps||[]).map(g => ({assessment_id:aid, gap_id:g.id, description:g.description})));
    if (gaps.length){const{error:e3}=await c.from('knowledge_gaps').insert(gaps);if(e3)console.error('Gap save err:',JSON.stringify(e3))}
    const bars = evals.flatMap(ev => (ev.barriers||[]).map(b => ({assessment_id:aid, barrier_id:b.id, description:b.description})));
    if (bars.length){const{error:e4}=await c.from('barriers').insert(bars);if(e4)console.error('Bar save err:',JSON.stringify(e4))}
    return { id:aid, shareToken:ar.share_token };
  } catch(e) { console.error('Save fail:', e?.message||e); return null; }
}

  ]);
  if (a.error) return null;
  return { assessment:a.data, evaluations:e.data||[], gaps:g.data||[], barriers:b.data||[] };
}

// Usage data loading
async function loadUsage(){
  S.usageData = null; render();
  if(!isSBReady()){S.usageData={error:true};render();return}
  const now = new Date();
  let after;
  if(S.usagePeriod==='week'){after=new Date(now-7*864e5)}
  else if(S.usagePeriod==='month'){after=new Date(now-30*864e5)}
  else if(S.usagePeriod==='year'){after=new Date(now-365*864e5)}
  else if(S.usagePeriod==='custom'&&S.usageFrom){after=new Date(S.usageFrom)}
  else{after=new Date(now-30*864e5)}
  const afterISO = after.toISOString();
  const beforeISO = (S.usagePeriod==='custom'&&S.usageTo) ? new Date(S.usageTo+'T23:59:59').toISOString() : now.toISOString();
  try{
    const [pvRes, assessRes] = await Promise.all([
      getSB().from('page_views').select('user_id,created_at').gte('created_at',afterISO).lte('created_at',beforeISO),
      getSB().from('assessment_requests').select('id,created_by_name,created_at').gte('created_at',afterISO).lte('created_at',beforeISO),
    ]);
    const pv = pvRes.data||[];
    const as = assessRes.data||[];
    S.usageData = {
      totalPageViews: pv.length,
      uniqueVisitors: new Set(pv.map(p=>p.user_id)).size,
      totalAssessments: as.length,
      uniqueAssessors: new Set(as.map(a=>a.created_by_name||'unknown')).size,
      period: S.usagePeriod,
      from: after.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
      to: new Date(beforeISO).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
      dailyBreakdown: getDailyBreakdown(pv, as, after, new Date(beforeISO)),
    };
  }catch(e){
    console.error('Usage load error:',e);
    S.usageData = {totalPageViews:0,uniqueVisitors:0,totalAssessments:0,uniqueAssessors:0,period:S.usagePeriod,from:'-',to:'-',dailyBreakdown:[]};
  }
  render();
}

function getDailyBreakdown(pv, as, from, to){
  const days=[];const d=new Date(from);
  while(d<=to){days.push(d.toISOString().split('T')[0]);d.setDate(d.getDate()+1)}
  return days.slice(-14).map(day=>({
    date:day,
    views:pv.filter(p=>p.created_at?.startsWith(day)).length,
    assessments:as.filter(a=>a.created_at?.startsWith(day)).length,
  }));
}

    eval_id:ev.eval_id,out_id:ev.out_id,outcome_name:ev.outcome_name,outcome_type:ev.outcome_type,step_name:ev.step_name,
    importance:{value:ev.importance_value,rationale:ev.importance_rationale,confidence:ev.importance_confidence},
    satisfaction:{value:ev.satisfaction_value,rationale:ev.satisfaction_rationale,confidence:ev.satisfaction_confidence},
    opportunity_score:ev.opportunity_score,opportunity_derivation:ev.opportunity_derivation,opportunity_confidence:ev.opportunity_confidence,
    kano_classification:ev.kano_classification,kano_rationale:ev.kano_rationale,invest_signal:ev.invest_signal,invest_rationale:ev.invest_rationale,
    barriers:d.barriers.map(b=>({id:b.barrier_id,description:b.description})),
    gaps:d.gaps.map(g=>({id:g.gap_id,description:g.description})),
  }));
  S.fd={persona:a.persona,jobId:a.job_id,jobName:a.job_name,problem:a.problem_statement,market:a.market};
  S.out={evaluations:evals,matched:a.is_matched,
    summary:{decision_context:a.decision_context,recommendation:a.recommendation,overall_confidence:a.overall_confidence,
      key_findings:a.key_findings||[],total_outcomes:a.total_outcomes,tier_1_count:a.tier_1_count,tier_2_count:a.tier_2_count,overall_invest_signal:a.overall_invest_signal},
    matchResult:{matched:a.is_matched,matched_step:{step_id:a.matched_step_id,name:a.matched_step_name},proposed_job:a.proposed_job,proposed_steps:a.proposed_steps,match_rationale:a.match_rationale}};

}

// Main assessment function with auto-save
async function go() {
  S.fd.problem=document.getElementById("pi")?.value||S.fd.problem||"";
  S.fd.market=document.getElementById("mi")?.value||S.fd.market||"Global";
  if(!S.fd.persona||!S.fd.jobId||!S.fd.problem||S.fd.problem.length<10)return;
  S.screen="processing";S.ps=0;S.nav="assess";S.savedId=null;S.shareToken=null;render();
  pInt=setInterval(()=>{if(S.ps<8){S.ps++;render()}},500);
  setTimeout(async()=>{
    clearInterval(pInt);
    try{
      const job=(PERSONA_JOBS[S.fd.persona]||[]).find(j=>j.id===S.fd.jobId);
      let mr,er;
      if(job?.available){
        const sid=findBestStep(S.fd.problem),stp=STEPS.find(s=>s.step_id===sid);
        er=generateEvaluations(sid,S.fd.problem,S.fd.market,true);
        mr={matched:true,confidence:0.85,matched_step:stp,match_rationale:`Matched to "${stp?.name}".`};
        S.out={...er,matchResult:mr};
      } else {
        const disc=generateDiscovery(S.fd.persona,S.fd.jobId,S.fd.problem,S.fd.market);
        mr={matched:false,confidence:0,is_planned_job:disc.is_planned_job,proposed_job:disc.proposed_job,proposed_steps:disc.proposed_steps,match_rationale:disc.match_rationale};
        const de=disc.proposed_outcomes.map((o,i)=>({
          eval_id:`EVAL-${String(i+1).padStart(3,"0")}`,out_id:o.id,outcome_name:o.name,outcome_type:o.type||"functional",
          step_name:disc.proposed_steps[0]?.name||"—",step_id:disc.proposed_steps[0]?.step_id,
          importance:{value:"high",rationale:`Job-derived importance for ${disc.proposed_job.name}.`,confidence:2},
          satisfaction:{value:"NR",rationale:`No evidence in ${S.fd.market}. Needs research.`,confidence:0},
          opportunity_score:"tier_5",opportunity_derivation:"High importance + NR satisfaction = Need Research.",
          opportunity_confidence:0,kano_classification:"needs_research",kano_rationale:"Insufficient evidence.",
          barriers:[],gaps:[{id:`GAP-${String(i+1).padStart(3,"0")}`,description:`No research for "${o.name}" in ${S.fd.market}.`}],
          invest_signal:"research_first",invest_rationale:"Research required."
        }));
        er={evaluations:de,summary:{decision_context:`Discovery Mode for ${S.fd.market}.`,recommendation:`Research first — ${de.length} proposed outcomes lack evidence.`,
          overall_confidence:1,key_findings:[`${de.length} outcomes proposed.`,"All NR on satisfaction.","Governance review required."],
          total_outcomes:de.length,tier_1_count:0,tier_2_count:0,overall_invest_signal:"research_first"},matched:false};
        S.out={...er,matchResult:mr};
      }
      // Auto-save
      if(isSBReady()){
        const sv=await sbSave({persona:S.fd.persona,jobId:S.fd.jobId,jobName:S.fd.jobName,problem:S.fd.problem,market:S.fd.market},mr,er.evaluations,er.summary);
        if(sv){S.savedId=sv.id;S.shareToken=sv.shareToken;showToast('✓ Saved to Supabase');}
      }
      S.screen="output";S.at=1;render();
    }catch(e){S.err=e.message;S.screen="error";render();}
  },4500);
}
